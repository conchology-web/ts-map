name: Online VS Compile TsMap
on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Force Install Newtonsoft Json
      # 【核心修复】：在编译前，强行用 NuGet 为 TsMap 核心项目安装缺少的 Newtonsoft.Json 库
      run: |
        dotnet add TsMap/TsMap.csproj package Newtonsoft.Json
        dotnet add TsMap.Canvas/TsMap.Canvas.csproj package Newtonsoft.Json
        
    - name: Restore dependencies
      run: dotnet restore TsMap.sln
      
    - name: Build Project
      run: dotnet build TsMap.sln -c Release

    - name: Upload Executable
      uses: actions/upload-artifact@v4
      with:
        name: TsMap-Online-Built
        path: "**/bin/Release/**"
