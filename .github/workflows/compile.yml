name: Ultimate Hotfix Compile TsMap
on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: nuget/setup-nuget@v1

    - name: Frontal Strike - Remove Rigid Configurations
      run: |
        powershell -Command "(Get-Content TsMap.Canvas/TsMap.Canvas.csproj) -replace '<PostBuildEvent>.*?</PostBuildEvent>', '' | Set-Content TsMap.Canvas/TsMap.Canvas.csproj"
        powershell -Command "(Get-Content TsMap/TsMap.csproj) -replace '<TreatWarningsAsErrors>true</TreatWarningsAsErrors>', '<TreatWarningsAsErrors>false</TreatWarningsAsErrors>' | Set-Content TsMap/TsMap.csproj"
        powershell -Command "(Get-Content TsMap.Canvas/TsMap.Canvas.csproj) -replace '<TreatWarningsAsErrors>true</TreatWarningsAsErrors>', '<TreatWarningsAsErrors>false</TreatWarningsAsErrors>' | Set-Content TsMap.Canvas/TsMap.Canvas.csproj"

    - name: Install Newtonsoft.Json Package
      run: nuget install Newtonsoft.Json -Version 13.0.3 -OutputDirectory packages

    - name: Robust XML Injections via Native DotNet API
      # We use pure, native .NET XML classes inside PowerShell.
      # This bypasses the shell's loose type conversion array bugs and guarantees a perfect XML write.
      shell: powershell
      run: |
        $projects = @("TsMap/TsMap.csproj", "TsMap.Canvas/TsMap.Canvas.csproj")
        foreach ($path in $projects) {
            $doc = New-Object System.Xml.XmlDocument
            $doc.Load($path)
            
            # Find the root Namespace Manager to prevent legacy node insertion exceptions
            $nsmgr = New-Object System.Xml.XmlNamespaceManager($doc.NameTable)
            $nsmgr.AddNamespace("ns", $doc.DocumentElement.NamespaceURI)
            
            # Locate an appropriate ItemGroup block
            $itemGroup = $doc.SelectSingleNode("//ns:ItemGroup", $nsmgr)
            
            # Construct a clean legacy Reference element node
            $reference = $doc.CreateElement("Reference", $doc.DocumentElement.NamespaceURI)
            $reference.SetAttribute("Include", "Newtonsoft.Json")
            
            $hintPath = $doc.CreateElement("HintPath", $doc.DocumentElement.NamespaceURI)
            $hintPath.InnerText = "..\packages\Newtonsoft.Json.13.0.3\lib\net45\Newtonsoft.Json.dll"
            
            [void]$reference.AppendChild($hintPath)
            [void]$itemGroup.AppendChild($reference)
            
            $doc.Save($path)
            Write-Host "Successfully patched: $path"
        }

    - name: Restore Solution Assets
      run: nuget restore TsMap.sln
      
    - name: Build with Visual Studio MSBuild
      run: msbuild TsMap.sln /v:m

    - name: Scan Generated Files
      shell: powershell
      run: |
        Get-ChildItem -Path . -Filter *.exe -Recurse | Select-Object FullName

    - name: Gather Final Executables
      uses: actions/upload-artifact@v4
      with:
        name: TsMap-Hotfixed-Binaries
        path: |
          **/*.exe
          **/*.dll
