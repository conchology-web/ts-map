name: Online VS Compile TsMap
on:
  workflow_dispatch: # 允许你手动点击按钮触发编译

jobs:
  build:
    runs-on: windows-latest # 租用一台微软官方的 Windows 线上虚拟机
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # 把代码下载到虚拟机里
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4 # 在虚拟机里配置 VS 编译环境
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore TsMap.sln # 自动下载项目缺少的库（如 Newtonsoft.Json）
      
    - name: Build Project
      run: dotnet build TsMap.sln -c Release # 开始执行 VS 后台编译

    - name: Upload Executable
      uses: actions/upload-artifact@v4 # 编译完成后，把生成的 exe 打包发给你
      with:
        name: TsMap-Online-Built
        path: "**/bin/Release/**"
