name: Ultimate Hotfix Compile TsMap
on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: microsoft/setup-msbuild@v2

    - name: Frontal Strike - Remove Broken PostBuildEvents
      run: |
        powershell -Command "(Get-Content TsMap.Canvas/TsMap.Canvas.csproj) -replace '<PostBuildEvent>.*?</PostBuildEvent>', '' | Set-Content TsMap.Canvas/TsMap.Canvas.csproj"
        powershell -Command "(Get-Content TsMap/TsMap.csproj) -replace '<TreatWarningsAsErrors>true</TreatWarningsAsErrors>', '<TreatWarningsAsErrors>false</TreatWarningsAsErrors>' | Set-Content TsMap/TsMap.csproj"
        powershell -Command "(Get-Content TsMap.Canvas/TsMap.Canvas.csproj) -replace '<TreatWarningsAsErrors>true</TreatWarningsAsErrors>', '<TreatWarningsAsErrors>false</TreatWarningsAsErrors>' | Set-Content TsMap.Canvas/TsMap.Canvas.csproj"

    - name: Inject Newtonsoft.Json
      run: |
        nuget install Newtonsoft.Json -Version 13.0.3 -OutputDirectory packages
        powershell -Command "$JsonXml = '<Reference Include=\"Newtonsoft.Json\"><HintPath>..\packages\Newtonsoft.Json.13.0.3\lib\net45\Newtonsoft.Json.dll</HintPath></Reference>'; (Get-Content TsMap/TsMap.csproj) -replace '<ItemGroup>', \"<ItemGroup>`n    `$JsonXml\" | Set-Content TsMap/TsMap.csproj"
        powershell -Command "$JsonXml = '<Reference Include=\"Newtonsoft.Json\"><HintPath>..\packages\Newtonsoft.Json.13.0.3\lib\net45\Newtonsoft.Json.dll</HintPath></Reference>'; (Get-Content TsMap.Canvas/TsMap.Canvas.csproj) -replace '<ItemGroup>', \"<ItemGroup>`n    `$JsonXml\" | Set-Content TsMap.Canvas/TsMap.Canvas.csproj"
        
    - name: Restore Project
      run: nuget restore TsMap.sln
      
    - name: Build with Visual Studio MSBuild
      run: msbuild TsMap.sln /v:m

    - name: Scan and Show Generated Files
      # 【核心正面诊断】：在控制台强制递归打印当前目录下所有的 .exe 文件，让我们在日志里一眼能看到它被编译到了哪个角落！
      run: |
        dir /s *.exe

    - name: Gather Final Executables
      uses: actions/upload-artifact@v4
      with:
        name: TsMap-Hotfixed-Binaries
        # 【核心破局】：不要指定任何具体文件夹。
        # 只要在这个项目根目录下（.）被拉出来的、任何深度的所有 .exe 和 .dll，全部一网打尽打包！
        path: |
          **/*.exe
          **/*.dll
