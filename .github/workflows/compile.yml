name: Legacy Framework Compile TsMap
on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      
    - name: Setup NuGet
      uses: nuget/setup-nuget@v1

    - name: Legacy Hotfix - Inject Newtonsoft.Json and Disable Strict Warnings
      run: |
        $JsonXml = '<Reference Include="Newtonsoft.Json"><HintPath>..\packages\Newtonsoft.Json.13.0.3\lib\net45\Newtonsoft.Json.dll</HintPath></Reference>'
        (Get-Content TsMap/TsMap.csproj) -replace '<ItemGroup>', "<ItemGroup>`n    $JsonXml" | Set-Content TsMap/TsMap.csproj
        (Get-Content TsMap.Canvas/TsMap.Canvas.csproj) -replace '<ItemGroup>', "<ItemGroup>`n    $JsonXml" | Set-Content TsMap.Canvas/TsMap.Canvas.csproj
        (Get-Content TsMap/TsMap.csproj) -replace '<TreatWarningsAsErrors>true</TreatWarningsAsErrors>', '<TreatWarningsAsErrors>false</TreatWarningsAsErrors>' | Set-Content TsMap/TsMap.csproj
        (Get-Content TsMap.Canvas/TsMap.Canvas.csproj) -replace '<TreatWarningsAsErrors>true</TreatWarningsAsErrors>', '<TreatWarningsAsErrors>false</TreatWarningsAsErrors>' | Set-Content TsMap.Canvas/TsMap.Canvas.csproj
        (Get-Content TsMap.Canvas/TsMap.Canvas.csproj) -replace '<PostBuildEvent>.*?</PostBuildEvent>', '' | Set-Content TsMap.Canvas/TsMap.Canvas.csproj

    - name: Install Newtonsoft.Json Package
      run: nuget install Newtonsoft.Json -Version 13.0.3 -OutputDirectory packages
        
    - name: Legacy Nuget Restore
      run: nuget restore TsMap.sln
      
    - name: Build with Visual Studio MSBuild
      # 【核心正面解决】：
      # 抹除死板的 /p:Platform 传参，不强制指定 Any CPU，让 MSBuild 顺着 .sln 内部的默认第一配置直接编译。
      run: msbuild TsMap.sln /v:m

    - name: Upload Compiled Binaries
      uses: actions/upload-artifact@v4
      with:
        name: TsMap-Legacy-Success-Binaries
        # 扩大抓取范围，无论是 bin/Debug、bin/Release 还是 x64，只要生成了编译产物，全部打包发回。
        path: |
          **/bin/
