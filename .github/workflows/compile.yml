name: Unbreakable MSBuild Compile TsMap
on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      
    - name: Setup NuGet
      uses: nuget/setup-nuget@v1

    - name: Fix Code & Project Configuration
      # 【正面破局】：
      # 1. 强制在项目文件中关闭“将警告视为错误” (TreatWarningsAsErrors=false)
      # 2. 强行删除原作者绑定的老旧、死板的 C++ libdeflate 绝对路径引用，全部改由 NuGet 接管
      # 3. 补全由于 .NET 版本更迭导致的必要声明
      run: |
        powershell -Command "(Get-Content TsMap/TsMap.csproj) -replace '<TreatWarningsAsErrors>true</TreatWarningsAsErrors>', '<TreatWarningsAsErrors>false</TreatWarningsAsErrors>' | Set-Content TsMap/TsMap.csproj"
        powershell -Command "(Get-Content TsMap.Canvas/TsMap.Canvas.csproj) -replace '<TreatWarningsAsErrors>true</TreatWarningsAsErrors>', '<TreatWarningsAsErrors>false</TreatWarningsAsErrors>' | Set-Content TsMap.Canvas/TsMap.Canvas.csproj"
        powershell -Command "(Get-Content TsMap.sln) -replace 'ValidateArchitecture', 'Build' | Set-Content TsMap.sln"

    - name: Inject Missing Packages via NuGet
      # 用最安全的 nuget.exe 强行补齐全局第三方组件
      run: |
        nuget install Newtonsoft.Json -Version 13.0.3 -OutputDirectory packages
        dotnet add TsMap/TsMap.csproj package Newtonsoft.Json
        dotnet add TsMap.Canvas/TsMap.Canvas.csproj package Newtonsoft.Json
        
    - name: Restore Project
      run: nuget restore TsMap.sln
      
    - name: Build with Maximum Tolerance
      # 【核心修复】：
      # 1. 指定明确的目标平台 AnyCPU 或 x64
      # 2. 注入全局指令开关控制关闭全部可能拦截编译的警告与代码分析，只管出 exe 结果
      run: |
        msbuild TsMap.sln /p:Configuration=Release /p:Platform="Any CPU" /p:TreatWarningsAsErrors=false /p:RunAnalyzers=false /p:WarningLevel=0 /v:m

    - name: Force Catch Output Elements
      # 【核心修复】：
      # 因为原作者有两个独立的工程，有的编译后会丢在顶层的 bin 目录，有的丢在子目录。
      # 我们扩大抓取范围，只要名字叫 Release 的文件夹，全部无条件抓取打包。
      uses: actions/upload-artifact@v4
      with:
        name: TsMap-Final-Executable
        path: |
          **/Release/
          ./bin/
